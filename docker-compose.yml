services:
  loankit:
    build:
      context: .
      dockerfile: Dockerfile
    image: loankit:latest
    container_name: loankit
    restart: unless-stopped
    # Bind to localhost only — Tailscale Serve proxies 443 -> 127.0.0.1:3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
      - ./report_assets:/app/report_assets:ro
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # Resource limits to protect host
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
